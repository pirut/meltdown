<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8A80"/>
      <stop offset="50%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#EF5350"/>
    </linearGradient>
    <linearGradient id="face" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF7"/>
      <stop offset="100%" stop-color="#FFF0E0"/>
    </linearGradient>
    <linearGradient id="tear" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#4FC3F7"/>
    </linearGradient>
    <linearGradient id="melt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF0E0"/>
      <stop offset="100%" stop-color="#FFE0CC"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#C62828" flood-opacity="0.25"/>
    </filter>
    <filter id="tearShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0277BD" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Melting drips from the face -->
  <ellipse cx="192" cy="395" rx="18" ry="42" fill="url(#melt)" opacity="0.9"/>
  <ellipse cx="256" cy="410" rx="24" ry="52" fill="url(#melt)" opacity="0.9"/>
  <ellipse cx="320" cy="400" rx="18" ry="45" fill="url(#melt)" opacity="0.9"/>

  <!-- Face circle -->
  <circle cx="256" cy="234" r="128" fill="url(#face)" filter="url(#shadow)"/>

  <!-- Eyes - scrunched crying -->
  <!-- Left eye -->
  <path d="M192 213 Q208 192 224 213" stroke="#5D4037" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M192 213 Q208 234 224 213" stroke="#5D4037" stroke-width="9" fill="none" stroke-linecap="round"/>
  <!-- Right eye -->
  <path d="M288 213 Q304 192 320 213" stroke="#5D4037" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M288 213 Q304 234 320 213" stroke="#5D4037" stroke-width="9" fill="none" stroke-linecap="round"/>

  <!-- Eyebrows - worried angled up in center -->
  <path d="M181 186 Q208 168 230 181" stroke="#5D4037" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M331 186 Q304 168 282 181" stroke="#5D4037" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- Open wailing mouth -->
  <ellipse cx="256" cy="277" rx="42" ry="32" fill="#5D4037"/>
  <ellipse cx="256" cy="272" rx="32" ry="19" fill="#EF5350"/>

  <!-- Blush cheeks -->
  <circle cx="181" cy="250" r="21" fill="#FFAB91" opacity="0.5"/>
  <circle cx="331" cy="250" r="21" fill="#FFAB91" opacity="0.5"/>

  <!-- Tear drops -->
  <!-- Left tear - splashing out -->
  <g filter="url(#tearShadow)">
    <path d="M171 218 Q155 208 147 181 Q144 173 152 176 Q166 186 171 208 Z" fill="url(#tear)" opacity="0.9"/>
    <circle cx="139" cy="170" r="8" fill="url(#tear)" opacity="0.8"/>
  </g>

  <!-- Right tear - splashing out -->
  <g filter="url(#tearShadow)">
    <path d="M341 218 Q357 208 365 181 Q368 173 360 176 Q346 186 341 208 Z" fill="url(#tear)" opacity="0.9"/>
    <circle cx="373" cy="170" r="8" fill="url(#tear)" opacity="0.8"/>
  </g>

  <!-- Streaming tears down cheeks -->
  <path d="M192 224 Q186 256 181 293" stroke="#81D4FA" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M320 224 Q326 256 331 293" stroke="#81D4FA" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
