<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8A80"/>
      <stop offset="50%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#EF5350"/>
    </linearGradient>
    <linearGradient id="face" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF7"/>
      <stop offset="100%" stop-color="#FFF0E0"/>
    </linearGradient>
    <linearGradient id="tear" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#4FC3F7"/>
    </linearGradient>
    <linearGradient id="melt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF0E0"/>
      <stop offset="100%" stop-color="#FFE0CC"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#C62828" flood-opacity="0.25"/>
    </filter>
    <filter id="tearShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#0277BD" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" fill="url(#bg)"/>

  <!-- Melting drips from the face -->
  <ellipse cx="72" cy="148" rx="7" ry="16" fill="url(#melt)" opacity="0.9"/>
  <ellipse cx="96" cy="155" rx="9" ry="20" fill="url(#melt)" opacity="0.9"/>
  <ellipse cx="120" cy="150" rx="7" ry="17" fill="url(#melt)" opacity="0.9"/>

  <!-- Face circle -->
  <circle cx="96" cy="88" r="48" fill="url(#face)" filter="url(#shadow)"/>

  <!-- Eyes - scrunched crying -->
  <!-- Left eye -->
  <path d="M72 80 Q78 72 84 80" stroke="#5D4037" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M72 80 Q78 88 84 80" stroke="#5D4037" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Right eye -->
  <path d="M108 80 Q114 72 120 80" stroke="#5D4037" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M108 80 Q114 88 120 80" stroke="#5D4037" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Eyebrows - worried/sad angled up in center -->
  <path d="M68 70 Q78 63 86 68" stroke="#5D4037" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M124 70 Q114 63 106 68" stroke="#5D4037" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Open wailing mouth -->
  <ellipse cx="96" cy="104" rx="16" ry="12" fill="#5D4037"/>
  <ellipse cx="96" cy="102" rx="12" ry="7" fill="#EF5350"/>

  <!-- Blush cheeks -->
  <circle cx="68" cy="94" r="8" fill="#FFAB91" opacity="0.5"/>
  <circle cx="124" cy="94" r="8" fill="#FFAB91" opacity="0.5"/>

  <!-- Tear drops -->
  <!-- Left tear - splashing out -->
  <g filter="url(#tearShadow)">
    <path d="M64 82 Q58 78 55 68 Q54 65 57 66 Q62 70 64 78 Z" fill="url(#tear)" opacity="0.9"/>
    <!-- Small splash drop -->
    <circle cx="52" cy="64" r="3" fill="url(#tear)" opacity="0.8"/>
  </g>

  <!-- Right tear - splashing out -->
  <g filter="url(#tearShadow)">
    <path d="M128 82 Q134 78 137 68 Q138 65 135 66 Q130 70 128 78 Z" fill="url(#tear)" opacity="0.9"/>
    <!-- Small splash drop -->
    <circle cx="140" cy="64" r="3" fill="url(#tear)" opacity="0.8"/>
  </g>

  <!-- Streaming tears down cheeks -->
  <path d="M72 84 Q70 96 68 110" stroke="#81D4FA" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M120 84 Q122 96 124 110" stroke="#81D4FA" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
